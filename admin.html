<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Yehova Nissy Ministries</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background-color: var(--bg-main); color: var(--text-main); font-family: var(--font-body); }
        .admin-container { 
            max-width: 900px; 
            margin: 4rem auto; 
            padding: 3rem; 
            background: #fff; 
            border-radius: 12px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); 
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #eee; }
        .auth-container { max-width: 400px; margin: 5rem auto; text-align: center; }
        .auth-container input { width: 100%; margin-bottom: 1rem; padding: 1rem; border: 1px solid #ddd; border-radius: 6px; }
        .dashboard { display: none; }
        
        .admin-section { margin-bottom: 3rem; }
        .admin-section h3 { margin-bottom: 1.5rem; color: var(--primary); }
        
        .form-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .form-row input { flex: 1; padding: 0.8rem; border: 1px solid #ddd; border-radius: 6px; }
        .form-row button { padding: 0 1.5rem; background: var(--primary); color: #fff; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .form-row button:hover { background: var(--primary-light); }
        
        .item-list { list-style: none; padding: 0; }
        .item-list li { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 1rem; 
            background: var(--bg-main); 
            margin-bottom: 0.5rem; 
            border-radius: 6px; 
            border: 1px solid #eee;
        }
        .btn-danger { background: #ef4444; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
        .btn-danger:hover { background: #dc2626; }
        
        #error-msg { color: #ef4444; margin-bottom: 1rem; display: none; }
        
        .gallery-preview { height: 40px; width: 60px; object-fit: cover; border-radius: 4px; margin-right: 1rem; }
        .flex-row { display: flex; align-items: center; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Auth Section -->
        <div class="admin-container auth-container" id="auth-section">
            <h2 style="margin-bottom: 0.5rem;">Admin Login</h2>
            <p style="margin-bottom: 2rem; color: var(--text-light);">Local access only.</p>
<div id="error-msg">Invalid password. Try 'Nissy@123'</div>
            <input type="password" id="password-input" placeholder="Enter Admin Password">
            <button class="btn-primary" id="login-btn" style="width: 100%;">Login to Dashboard</button>
            <div style="margin-top: 2rem;">
                <a href="index.html" style="color: var(--accent);">&#8592; Back to Site</a>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div class="admin-container dashboard" id="dashboard-section">
            <div class="header-top">
                <h2>Admin Dashboard</h2>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <a href="index.html" style="color: var(--text-light); text-decoration: underline;">View Live Site</a>
                    <button class="btn-secondary" id="logout-btn" style="color: var(--primary); border-color: var(--text-light); padding: 0.5rem 1rem;">Logout</button>
                </div>
            </div>

            <!-- Manage Events -->
            <div class="admin-section">
                <h3>Manage Upcoming Events</h3>
                <div class="form-row">
                    <input type="date" id="event-date" required>
                    <input type="text" id="event-title" placeholder="Event Title (e.g., Sunday Worship)" required>
                    <input type="text" id="event-time" placeholder="Time & Location" required>
                    <button id="add-event-btn">Add Event</button>
                </div>
                <ul class="item-list" id="events-list-admin">
                    <!-- Event items rendered here -->
                </ul>
            </div>

            <!-- Manage Gallery -->
            <div class="admin-section">
                <h3>Manage Gallery</h3>
                <p style="margin-bottom: 1rem; font-size: 0.9rem; color: var(--text-light);">Paste a direct image URL (e.g., from Unsplash, Imgur, etc.)</p>
                <div class="form-row">
                    <input type="url" id="gallery-url" placeholder="https://example.com/image.jpg" required>
                    <button id="add-gallery-btn">Add Image</button>
                </div>
                <ul class="item-list" id="gallery-list-admin">
                    <!-- Gallery items rendered here -->
                </ul>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
